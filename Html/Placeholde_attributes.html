<!-- PlaceHolder attributes -->

<input type="text" placeholder="Enter name">


<!-- button element -->
<button type="button">Click Me!</button>

<!-- checkbox element -->

<input type="checkbox" id="option1" name="option1" value="Value1">
<label for="option1">Label Text</label>g

<!-- Radio Button -->
 <form>
  <p>Select your favorite language:</p>
  <input type="radio" id="html" name="fav_language" value="HTML">
  <label for="html">HTML</label><br>

  <input type="radio" id="css" name="fav_language" value="CSS">
  <label for="css">CSS</label><br>

  <input type="radio" id="js" name="fav_language" value="JS">
  <label for="js">JavaScript</label>
</form>

<!-- Select button -->
 <label for="cars">Choose a car:</label>

<select name="cars" id="cars">
  <option value="volvo">Volvo</option>
  <option value="saab">Saab</option>
  <option value="mercedes">Mercedes</option>
  <option value="audi">Audi</option>
</select>

<!-- Input Range Element -->
 <label for="volume">Volume:</label>
<input type="range" id="volume" name="volume" min="0" max="100">


<!-- Text area -->
 <label for="message">Leave a comment:</label>
<textarea id="message" name="message" rows="4" cols="50">
This is the default text.
</textarea>
