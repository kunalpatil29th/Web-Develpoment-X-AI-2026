<!-- Understanding HTML
What is HTML?

HTML stands for HyperText Markup Language.
It is used to create the structure of web pages.

HTML tells the browser:

what to display
how content is organized
where headings, images, buttons, and links appear
Real Life Example

Think of a website like a house:

HTML → Structure of house
CSS → Design & colors
JavaScript → Functionality & actions
Basic HTML Structure -->
<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
</head>
<body>

    <h1>Hello World</h1>
    <p>This is HTML.</p>

</body>
</html>

Common HTML Tags
Tag	Purpose -->
<h1> to <h6>	Headings
<p>	Paragraph
<a>	Link
<img>	Image
<button>	Button
<ul>	Unordered list
<ol>	Ordered list
<div>	Container
Example of Common Tags
<h1>Main Heading</h1>

<p>This is paragraph.</p>

<a href="https://google.com">Google</a>

<button>Click Me</button>
HTML Elements

An HTML element usually contains:

<tagname>Content</tagname>

Example:

<p>Hello</p>
<p> → Opening tag
Hello → Content
</p> → Closing tag
