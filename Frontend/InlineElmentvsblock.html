<!--
Inline Element vs Block Element in HTML
Feature	Block Element	Inline Element
Starts on new line?	Yes	No
Takes full width?	Yes	Only needed width
Width & Height can be set?	Yes	Mostly No
Can contain	Block + Inline elements	Usually text or inline elements
Example use	Sections, layout	Styling text
Block Elements

Block elements always start from a new line and take the full available width.

Examples
<div>
<p>
<h1> to <h6>
<section>
<article>
Example
<div>Hello</div>
<div>World</div>
Output
Hello
World

Because each <div> starts on a new line.

Inline Elements

Inline elements stay in the same line and only take the space they need.

Examples
<span>
<a>
<strong>
<em>
<img>
Example
<span>Hello</span>
<span>World</span>
Output
Hello World

Both appear in the same line.

Visual Difference
Block Element
<div style="background:red;">Block 1</div>
<div style="background:blue;">Block 2</div>

Blocks appear one below another.

Inline Element
<span style="background:red;">Inline 1</span>
<span style="background:blue;">Inline 2</span>

Inline elements appear side by side.

Easy Trick to Remember
Block = Big box / New line
Inline = Inside line
Most Important Interview Point

You can change behavior using CSS:

display: block;
display: inline;
display: inline-block;

Example:

<span style="display:block;">Now span acts like block</span>
Bonus: Inline-Block

inline-block:

stays in same line like inline
but accepts width & height like block
<div style="display:inline-block; width:100px; height:100px; background:red;">
Box
</div>


-->
